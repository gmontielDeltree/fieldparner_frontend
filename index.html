    <style>
      /*mapbox gl css custom settings*/
      #map {
        position: absolute;
        top: 56px;
        bottom: 0;
        width: 100%;
        height: calc(100vh - 100px) !important;
      }

      .mapboxgl-ctrl-group button + button {
        border-top: none;
      }

      .mapboxgl-ctrl-top-right {
        z-index: 0 !important;
      }

      vaadin-date-picker-overlay {
        z-index: 9999;
      }

      vaadin-combo-box-overlay {
        z-index: 9999;
      }
      vaadin-context-menu-overlay {
        z-index: 9999;
      }

      vaadin-dialog-overlay{
        z-index: 9999;
      }
      
      .marker {
        background-image: url('centralmeteorologica.webp');
        background-size: cover;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
      }
    </style>

    <!-- shims global para -->
    <script>
      window.process = window.process || {};
      window.global = window;
      // https://github.com/pouchdb/pouchdb/issues/8051#issuecomment-686332652
      window.process = {
        browser: true,
      };
    </script>

    <link
      rel="preload"

    <script>
      // Register Service Worker
      if ("serviceWorker" in navigator) {
        const p = navigator.serviceWorker

          .catch((err) => console.error("Could not load service-worker.", err));

      const version = "0002";
