<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <title>Agrotools FieldPartner</title>
    <meta name="description" content="Agrotools FieldPartner" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Disable tap highlight on IE -->
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- Progressive Web App -->
    <meta name="theme-color" content="#f5f8fa" />
    <link rel="manifest" href="manifest.json" />

    <!-- Add to homescreen for Chrome on Android -->
    <meta name="mobile-web-app-capable" content="yes" />
    <link
      rel="icon"
      sizes="192x192"
      href="images/icons/desktop/android-chrome-192x192.png"
    />
    <link
      rel="icon"
      sizes="512x512"
      href="images/icons/desktop/android-chrome-512x512.png"
    />

    <!-- Add to homescreen for Safari on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Agrotools" />
    <link
      rel="apple-touch-icon-precomposed"
      href="images/icons/desktop/apple-touch-icon.png"
    />


    <!-- Place favicon.ico in the root directory -->
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="images/icons/desktop/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="images/icons/desktop/favicon-16x16.png"
    />

    <script type="module" src="/main.js"></script>

    <script src="assets/reroot/jquery.slim.min.js"></script>
    <!-- import zUIx library (v 0.4.9-54) -->
    <script src="zuix/zuix.min.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/zuix"></script> -->
    <script src="zuix/zuix-bundler.min.js"></script>
    <!--<script src="zuix/app.bundle.js"></script>-->


    <script src="index.js" defer></script>


    <!--Audio Recorder-->
    <script src="assets/components/audiorecorder/index.js"></script>


    <script src="https://unpkg.com/intro.js/minified/intro.min.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/intro.js/minified/introjs.min.css"
    />

       <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/material-design-iconic-font/2.2.0/css/material-design-iconic-font.min.css"
    />
    <link rel="stylesheet" href="./src/timeline.css" />

    <style>
      /*mapbox gl css custom settings*/
      #map {
        position: absolute;
        top: 56px;
        bottom: 0;
        width: 100%;
        height: calc(100vh - 100px) !important;
      }

      .mapboxgl-ctrl-group button + button {
        border-top: none;
      }

      .mapboxgl-ctrl-top-right{
        z-index: 0 !important;
      }

      vaadin-date-picker-overlay{
        z-index:9999
      }
    
      vaadin-combo-box-overlay{
        z-index:9999
      }
    </style>

    <script></script>
    <!-- shims global para -->
    <script>
      window.process = window.process || {};
      window.global = window;
      // https://github.com/pouchdb/pouchdb/issues/8051#issuecomment-686332652
      window.process = {
      browser: true,
    }
    </script>
  </head>
  <!-- load the 'header_auto_hide' on the body -->

  <body>
    <script
      type="module"
      src="./owncomponents/campo-offcanvas/campo-offcanvas.js"
    ></script>
    <script
      type="module"
      src="./owncomponents/lote-offcanvas/lote-offcanvas.js"
    ></script>
    <script
      type="module"
      src="./owncomponents/nueva-geometria/nueva-geometria.js"
    ></script>
    <script
      type="module"
      src="./owncomponents/nuevo-campo/nuevo-campo.js"
    ></script>
    <script
      type="module"
      src="./owncomponents/lista-de-campos/lista-de-campos.js"
    ></script>
    <script
      type="module"
      src="./owncomponents/field-partner/field-partner.js"
    ></script>
    <script

      src="./owncomponents/navbar-element/navbar-element.js"
    ></script>
    <script
      type="module"
      src="./owncomponents/mapa-principal/mapa-principal.js"
    ></script>
    <script
      type="module"
      src="./owncomponents/login-modal/login-modal.js"
    ></script>

    <!--Main App Element-->
    <field-partner>
      <!-- <section data-ui-load="pages/map"></section> -->
      <div id="tour"></div>

      <!-- The DrawerLayout for side menu panel -->
      <div
        data-ui-load="@lib/controllers/drawer_layout"
        data-ui-options="options.drawerLayout"
        class="drawer"
        draggable="false"
      >
      
      <!-- Add Navigation Drawer content -->
      <div data-ui-load="shared/main_menu"></div>
      </div>
      
    </field-partner>

    <noscript> Turn on JavaScript to access this site content. </noscript>
