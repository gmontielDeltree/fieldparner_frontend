name: CI Tests

on:
  push:
    branches: [ main, master, develop, feature/** ]
  pull_request:
    branches: [ main, master, develop, feature/** ]

jobs:
  unit-tests:
    name: Unit and Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (default)
        run: npm test --silent

  heavy-tests:
    name: Heavy Flow Tests (non-blocking)
    runs-on: ubuntu-latest
    needs: unit-tests
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run heavy tests (PlanActivity full flow)
        env:
          RUN_HEAVY_TESTS: '1'
        run: npm test --silent


