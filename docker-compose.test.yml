version: '3.8'

services:
  couchdb-test:
    image: couchdb:3.3
    container_name: fieldpartner-couchdb-test
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=testpassword
    ports:
      - "5984:5984"
    volumes:
      - couchdb-test-data:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  couchdb-test-data:
